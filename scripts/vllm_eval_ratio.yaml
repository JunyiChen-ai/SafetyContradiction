base_model: google/gemma-2-2b
model_alias: gemma-2-2b

ckpt_root: ckpt/gemma-2-2b/ratio_variance
output_root: evaluation_result

pku_test_dir: data/PKU
wild_test_dir: data/WildGuardMix

ratio_values:
  - "1.5"
  - "1.6"
  - "1.7"
  - "1.8"
  - "1.9"
  - "2.0"
eval_limit: 0

temperature: 0.7
top_p: 0.95
